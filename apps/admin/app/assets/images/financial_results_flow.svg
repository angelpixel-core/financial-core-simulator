<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220" fill="none">
  <defs>
    <style>
      .bg { fill: #0f172a; opacity: 0.06; }
      .box { fill: #0b1220; stroke: #1f2a44; stroke-width: 1.4; }
      .text { fill: #e2e8f0; font-family: "Inter", "Segoe UI", Arial, sans-serif; font-size: 14px; font-weight: 600; }
      .sub { fill: #94a3b8; font-family: "Inter", "Segoe UI", Arial, sans-serif; font-size: 12px; }
      .arrow { stroke: #38bdf8; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" x="10" y="10" width="880" height="200" rx="16" />

  <rect class="box" x="40" y="60" width="170" height="80" rx="12" />
  <text class="text" x="125" y="95" text-anchor="middle">PnL trend</text>
  <text class="sub" x="125" y="115" text-anchor="middle">Direction</text>

  <rect class="box" x="250" y="60" width="180" height="80" rx="12" />
  <text class="text" x="340" y="95" text-anchor="middle">Latest run</text>
  <text class="sub" x="340" y="115" text-anchor="middle">Baseline</text>

  <rect class="box" x="460" y="60" width="180" height="80" rx="12" />
  <text class="text" x="550" y="95" text-anchor="middle">Accounts</text>
  <text class="sub" x="550" y="115" text-anchor="middle">Top exposure</text>

  <rect class="box" x="670" y="60" width="180" height="80" rx="12" />
  <text class="text" x="760" y="95" text-anchor="middle">Decision</text>
  <text class="sub" x="760" y="115" text-anchor="middle">Investigate PnL</text>

  <path class="arrow" d="M210 100 H240" />
  <path class="arrow" d="M430 100 H450" />
  <path class="arrow" d="M640 100 H660" />

  <text class="sub" x="450" y="175" text-anchor="middle">Financial flow: trend -> baseline -> exposure -> action</text>
</svg>
