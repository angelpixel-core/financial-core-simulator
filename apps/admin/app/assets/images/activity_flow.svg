<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220" fill="none">
  <defs>
    <style>
      .bg { fill: #0f172a; opacity: 0.06; }
      .box { fill: #0b1220; stroke: #1f2a44; stroke-width: 1.4; }
      .text { fill: #e2e8f0; font-family: "Inter", "Segoe UI", Arial, sans-serif; font-size: 14px; font-weight: 600; }
      .sub { fill: #94a3b8; font-family: "Inter", "Segoe UI", Arial, sans-serif; font-size: 12px; }
      .arrow { stroke: #38bdf8; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" x="10" y="10" width="880" height="200" rx="16" />

  <rect class="box" x="40" y="60" width="170" height="80" rx="12" />
  <text class="text" x="125" y="95" text-anchor="middle">Run stream</text>
  <text class="sub" x="125" y="115" text-anchor="middle">Last 14 days</text>

  <rect class="box" x="250" y="60" width="170" height="80" rx="12" />
  <text class="text" x="335" y="95" text-anchor="middle">Status mix</text>
  <text class="sub" x="335" y="115" text-anchor="middle">Success vs failures</text>

  <rect class="box" x="460" y="60" width="170" height="80" rx="12" />
  <text class="text" x="545" y="95" text-anchor="middle">Anomalies</text>
  <text class="sub" x="545" y="115" text-anchor="middle">Drops + spikes</text>

  <rect class="box" x="670" y="60" width="180" height="80" rx="12" />
  <text class="text" x="760" y="95" text-anchor="middle">Action</text>
  <text class="sub" x="760" y="115" text-anchor="middle">Investigate cause</text>

  <path class="arrow" d="M210 100 H240" />
  <path class="arrow" d="M420 100 H450" />
  <path class="arrow" d="M630 100 H660" />

  <text class="sub" x="450" y="175" text-anchor="middle">Activity flow: observe -> classify -> detect -> respond</text>
</svg>
