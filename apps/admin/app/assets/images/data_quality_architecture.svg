<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" width="920" height="260" fill="none">
  <defs>
    <style>
      .bg { fill: #0f172a; opacity: 0.06; }
      .box { fill: #0b1220; stroke: #1f2a44; stroke-width: 1.4; }
      .text { fill: #e2e8f0; font-family: "Inter", "Segoe UI", Arial, sans-serif; font-size: 13px; font-weight: 600; }
      .sub { fill: #94a3b8; font-family: "Inter", "Segoe UI", Arial, sans-serif; font-size: 12px; }
      .arrow { stroke: #38bdf8; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" x="10" y="10" width="900" height="240" rx="16" />

  <rect class="box" x="40" y="70" width="180" height="80" rx="12" />
  <text class="text" x="130" y="102" text-anchor="middle">Ingestion</text>
  <text class="sub" x="130" y="122" text-anchor="middle">Validator</text>

  <rect class="box" x="250" y="70" width="180" height="80" rx="12" />
  <text class="text" x="340" y="102" text-anchor="middle">Error Store</text>
  <text class="sub" x="340" y="122" text-anchor="middle">Sources + fields</text>

  <rect class="box" x="460" y="70" width="190" height="80" rx="12" />
  <text class="text" x="555" y="102" text-anchor="middle">Dashboard API</text>
  <text class="sub" x="555" y="122" text-anchor="middle">Quality signals</text>

  <rect class="box" x="680" y="70" width="200" height="80" rx="12" />
  <text class="text" x="780" y="102" text-anchor="middle">Admin UI</text>
  <text class="sub" x="780" y="122" text-anchor="middle">Ingestion errors</text>

  <path class="arrow" d="M220 110 H240" />
  <path class="arrow" d="M430 110 H450" />
  <path class="arrow" d="M650 110 H670" />

  <text class="sub" x="460" y="195" text-anchor="middle">Architecture focus: validation feedback loop</text>
</svg>
