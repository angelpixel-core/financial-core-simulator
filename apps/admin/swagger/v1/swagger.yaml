---
openapi: 3.0.1
info:
  title: Admin FX API
  version: v1
components:
  securitySchemes:
    AdminUser:
      type: apiKey
      name: X-Admin-User
      in: header
    AdminRole:
      type: apiKey
      name: X-Admin-Role
      in: header
  schemas:
    FxIngestion:
      type: object
      properties:
        ingestion_id:
          type: integer
        source_id:
          type: integer
        status:
          type: string
      required:
      - ingestion_id
      - source_id
      - status
    FxIngestionSource:
      type: object
      properties:
        source_id:
          type: integer
        source_name:
          type: string
        ingestion_id:
          type: integer
          nullable: true
        status:
          type: string
          nullable: true
        error_code:
          type: string
          nullable: true
        created_at:
          type: string
          format: date_time
          nullable: true
        updated_at:
          type: string
          format: date_time
          nullable: true
      required:
      - source_id
      - source_name
    FxIngestionList:
      type: object
      properties:
        sources:
          type: array
          items:
            "$ref": "#/components/schemas/FxIngestionSource"
      required:
      - sources
    FxHistoryRate:
      type: object
      properties:
        id:
          type: integer
        operational_date:
          type: string
          format: date
        base_currency:
          type: string
        quote_currency:
          type: string
        rate:
          type: string
          nullable: true
        source:
          type: string
        source_id:
          type: integer
          nullable: true
    FxHistoryEvent:
      type: object
      properties:
        event_type:
          type: string
        created_at:
          type: string
          format: date_time
        error_code:
          type: string
          nullable: true
        severity:
          type: string
          nullable: true
    FxHistoryLineage:
      type: object
      properties:
        source:
          type: string
          nullable: true
        source_id:
          type: integer
          nullable: true
        source_label:
          type: string
          nullable: true
        ingestion_id:
          type: integer
          nullable: true
        ingestion_status:
          type: string
          nullable: true
        upload_id:
          type: integer
          nullable: true
        upload_status:
          type: string
          nullable: true
        created_by_id:
          type: string
          nullable: true
        created_by_role:
          type: string
          nullable: true
        created_at:
          type: string
          format: date_time
          nullable: true
        updated_at:
          type: string
          format: date_time
          nullable: true
        placeholder_gap_id:
          type: integer
          nullable: true
        placeholder_gap_status:
          type: string
          nullable: true
        events:
          type: array
          items:
            "$ref": "#/components/schemas/FxHistoryEvent"
    FxHistoryResponse:
      type: object
      properties:
        source_id:
          type: integer
          nullable: true
        source_name:
          type: string
          nullable: true
        sort_order:
          type: string
        dates:
          type: array
          items:
            type: string
            format: date
        pairs:
          type: array
          items:
            type: object
            properties:
              base_currency:
                type: string
              quote_currency:
                type: string
            required:
            - base_currency
            - quote_currency
        rates_by_pair:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              "$ref": "#/components/schemas/FxHistoryRate"
        lineage:
          type: object
          additionalProperties:
            "$ref": "#/components/schemas/FxHistoryLineage"
      required:
      - dates
      - pairs
      - rates_by_pair
      - lineage
    FxObservabilityRange:
      type: object
      properties:
        from:
          type: string
          format: date_time
        to:
          type: string
          format: date_time
        days:
          type: integer
      required:
      - from
      - to
      - days
    FxObservabilitySummary:
      type: object
      properties:
        total:
          type: integer
        success:
          type: integer
        failed:
          type: integer
        running:
          type: integer
        pending:
          type: integer
      required:
      - total
      - success
      - failed
      - running
      - pending
    FxObservabilitySourceStatus:
      type: object
      properties:
        source_id:
          type: integer
        source_code:
          type: string
          nullable: true
        source_name:
          type: string
        status:
          type: string
          nullable: true
        error_code:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date_time
          nullable: true
      required:
      - source_id
      - source_name
    FxObservabilitySourceCounts:
      type: object
      properties:
        source_id:
          type: integer
        source_code:
          type: string
          nullable: true
        source_name:
          type: string
        success:
          type: integer
        failed:
          type: integer
        running:
          type: integer
        pending:
          type: integer
      required:
      - source_id
      - source_name
      - success
      - failed
      - running
      - pending
    FxObservabilityFailure:
      type: object
      properties:
        error_code:
          type: string
          nullable: true
        severity:
          type: string
          nullable: true
        count:
          type: integer
      required:
      - count
    FxObservabilityEvent:
      type: object
      properties:
        event_type:
          type: string
        created_at:
          type: string
          format: date_time
        error_code:
          type: string
          nullable: true
        severity:
          type: string
          nullable: true
        source_id:
          type: integer
          nullable: true
        source_code:
          type: string
          nullable: true
        ingestion_id:
          type: integer
          nullable: true
      required:
      - event_type
      - created_at
    FxObservabilityResponse:
      type: object
      properties:
        source_id:
          type: integer
          nullable: true
        source_name:
          type: string
          nullable: true
        range:
          "$ref": "#/components/schemas/FxObservabilityRange"
        summary:
          "$ref": "#/components/schemas/FxObservabilitySummary"
        sources:
          type: array
          items:
            "$ref": "#/components/schemas/FxObservabilitySourceStatus"
        counts_by_source:
          type: array
          items:
            "$ref": "#/components/schemas/FxObservabilitySourceCounts"
        failures_by_code:
          type: array
          items:
            "$ref": "#/components/schemas/FxObservabilityFailure"
        events:
          type: array
          items:
            "$ref": "#/components/schemas/FxObservabilityEvent"
      required:
      - range
      - summary
      - sources
      - counts_by_source
      - failures_by_code
      - events
security:
- AdminUser: []
  AdminRole: []
paths:
  "/admin/fx/ingestions/sync":
    post:
      summary: Queue FX ingestion
      tags:
      - FX
      parameters:
      - name: X-Admin-User
        in: header
        required: true
        schema:
          type: string
      - name: X-Admin-Role
        in: header
        required: true
        schema:
          type: string
      - name: source_id
        in: query
        required: true
        schema:
          type: integer
      security:
      - AdminUser: []
        AdminRole: []
      responses:
        '200':
          description: queued
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/FxIngestion"
        '422':
          description: invalid request
          content:
            application/json:
              schema:
                type: object
        '500':
          description: server error
          content:
            application/json:
              schema:
                type: object
  "/admin/fx/history":
    get:
      summary: FX history
      tags:
      - FX
      parameters:
      - name: X-Admin-User
        in: header
        required: true
        schema:
          type: string
      - name: X-Admin-Role
        in: header
        required: true
        schema:
          type: string
      - name: source_id
        in: query
        required: false
        schema:
          type: integer
      security:
      - AdminUser: []
        AdminRole: []
      responses:
        '200':
          description: history payload
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/FxHistoryResponse"
        '422':
          description: invalid request
          content:
            application/json:
              schema:
                type: object
        '500':
          description: server error
          content:
            application/json:
              schema:
                type: object
  "/admin/fx/observability":
    get:
      summary: FX observability
      tags:
      - FX
      parameters:
      - name: X-Admin-User
        in: header
        required: true
        schema:
          type: string
      - name: X-Admin-Role
        in: header
        required: true
        schema:
          type: string
      - name: source_id
        in: query
        required: false
        schema:
          type: integer
      - name: days
        in: query
        required: false
        schema:
          type: integer
      security:
      - AdminUser: []
        AdminRole: []
      responses:
        '200':
          description: observability payload
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/FxObservabilityResponse"
        '422':
          description: invalid request
          content:
            application/json:
              schema:
                type: object
        '500':
          description: server error
          content:
            application/json:
              schema:
                type: object
  "/admin/fx/ingestions":
    get:
      summary: List FX ingestions
      tags:
      - FX
      parameters:
      - name: X-Admin-User
        in: header
        required: true
        schema:
          type: string
      - name: X-Admin-Role
        in: header
        required: true
        schema:
          type: string
      - name: source_id
        in: query
        required: false
        schema:
          type: integer
      security:
      - AdminUser: []
        AdminRole: []
      responses:
        '200':
          description: ingestion list
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/FxIngestionList"
        '422':
          description: invalid request
          content:
            application/json:
              schema:
                type: object
        '500':
          description: server error
          content:
            application/json:
              schema:
                type: object
