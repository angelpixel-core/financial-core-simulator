            usage: { label: "Uso recomendado", value: "Revisar al inicio de cada sesion de monitoreo" }
            objective: { label: "Objetivo", value: "Confirmar estabilidad y detectar alertas tempranas" }
            frequency: { label: "Frecuencia", value: "Continuo en operaciones, puntual para auditorias" }
