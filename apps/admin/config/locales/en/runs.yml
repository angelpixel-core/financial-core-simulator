en:
  admin:
    runs:
      reliability_banner:
        states:
          reliable: "Reliable"
          degraded: "Degraded"
          loading: "Loading"
          info: "Info"
        aria: "Reliability status: %{state}"
      validation_issues:
        title: "Validation diagnostics"
        eyebrow: "Validation"
        aria: "Validation status: %{state}"
        table_container_aria: "Validation issues table with horizontal scroll"
        table_aria: "Validation issues"
        columns:
          severity: "Severity"
          source: "Source"
          field: "Field"
          message: "Message"
          timestamp: "Timestamp"
          correlation: "Correlation"
        empty: "No validation issues reported."
        states:
          success: "OK"
          warning: "Warning"
          error: "Error"
          loading: "Loading"
          info: "Info"
        severity:
          warning: "Warning"
          info: "Info"
          error: "Error"
        severity_aria: "Severity: %{severity}"
      run_selection_card:
        title: "Run #%{id}"
        status_aria: "Run status: %{status}"
        timestamp: "Timestamp"
        validation: "Validation"
        duration: "Duration"
      reliable_run_selector:
        reliable:
          what_happened: "Verified reliable run available."
          impact: "The inspection flow can continue without restrictions."
          next_action: "Open the run and review PnL, validation, and artifacts."
        no_run:
          what_happened: "No runs available yet."
          impact: "A reliable run cannot be identified at the moment."
          next_action: "Execute a test run and reload the overview."
        unverified:
          what_happened: "The latest successful run does not have reliable verification."
          impact: "Inspection is degraded because validation has not confirmed reliability yet."
          next_action: "Review run #%{run_id} (status %{status}, verification %{verification}) and run hash verification."
        degraded:
          what_happened: "No reliable run found."
          impact: "Automatic selection is degraded."
          next_action: "Verify the latest successful run or open the full runs list."
      validation_diagnostics:
        error:
          what_happened: "Run data validation failed."
          impact: "Results are not reliable for financial decisions."
          next_action: "Review issues, fix input, and re-run."
        warning:
          what_happened: "Validation could not complete due to a run failure."
          impact: "Data quality cannot be confirmed in this state."
          next_action: "Review the run error and try again."
        loading:
          what_happened: "The run is still executing."
          impact: "Validation is not available yet."
          next_action: "Wait for completion and reload the detail view."
        success:
          what_happened: "Validation reports no issues."
          impact: "Data is consistent for operational inspection."
          next_action: "Continue with PnL and review artifacts if needed."
      artifacts:
        eyebrow: "Evidence-first"
        title: "Evidence and artifacts"
        status_aria: "Artifact status %{state}"
        status_label: "Status: %{label}"
        unavailable_action: "%{label} (Unavailable)"
        status:
          complete: "Complete"
          partial: "Partial"
          unavailable: "Unavailable"
        entries:
          result_json:
            label: "Canonical result (JSON)"
            description: "Primary output contract for traceability and reconciliation."
            action: "Open result.json"
          positions_preview:
            label: "Positions preview"
            description: "Operational view of projected positions by market/account."
            action: "Open preview positions.csv"
          positions_download:
            label: "Positions download"
            description: "CSV export for audit and external analysis."
            action: "Download positions.csv"
          pnl_preview:
            label: "PnL preview"
            description: "Operational view of consolidated PnL per run."
            action: "Open preview pnl.csv"
          risk_view:
            label: "Risk view"
            description: "Drilldown by risk status, events, and margin."
            action: "Open risk view"
        provenance:
          run_id: "run_id"
          input_hash: "input_hash"
          timestamp_utc: "timestamp_utc"
          version: "version"
        version: "engine %{engine} / schema %{schema}"
