inherit_from: .rubocop_todo.yml

AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "apps/admin/**/*"

plugins:
  - rubocop-rspec
  - rubocop-performance

Style/StringLiterals:
  EnforcedStyle: double_quotes

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
