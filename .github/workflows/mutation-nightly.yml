name: Mutation Nightly

on:
  schedule:
    - cron: "0 3 * * *"

jobs:
  mutant:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run mutation testing
        run: bundle exec mutant run --use rspec "FCS::Engine*"
