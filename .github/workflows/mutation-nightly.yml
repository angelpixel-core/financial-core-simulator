name: Mutation Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    branches:
      - main
      - development
      - feat/*
      - fix/*
      - epic/*
      - story/*
    paths:
      - "lib/**/*.rb"
      - "spec/**/*.rb"

jobs:
  mutant:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run mutation testing
        run: bin/mutant
