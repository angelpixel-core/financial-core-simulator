name: CI

on:
  pull_request:
    paths:
      - .github/workflows/**
      - bin/**
      - lib/**
      - spec/**
      - apps/admin/**
      - Gemfile
      - Gemfile.lock
      - financial-core-simulator.gemspec
  push:
    branches:
      - main
      - development
      - feat/*
      - fix/*
      - epic/*
      - story/*
    paths:
      - .github/workflows/**
      - bin/**
      - lib/**
      - spec/**
      - apps/admin/**
      - Gemfile
      - Gemfile.lock
      - financial-core-simulator.gemspec

jobs:
  gem-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run gem specs
        run: bundle exec rspec

  gem-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run StandardRB
        run: bundle exec standardrb

      - name: Run Reek
        run: bundle exec reek

      - name: Run RubyCritic
        run: bundle exec rubycritic lib spec --no-browser

  gem-packwerk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run Packwerk (lib)
        run: bundle exec packwerk check
        working-directory: lib

  gem-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Build YARD docs
        run: bundle exec yard doc

      - name: Upload YARD HTML
        uses: actions/upload-artifact@v4
        with:
          name: yard-docs
          path: docs/yard

  gem-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run Bundler Audit
        run: bundle exec bundler-audit --update

  admin-tests:
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/admin_test
      DEMO_LOCK_ENABLED: "0"
      DEMO_LOCK_TTL_SECONDS: "900"
      DEMO_RATE_LIMIT_LOGIN_PER_MINUTE: "10"
      DEMO_RATE_LIMIT_UPLOAD_PER_HOUR: "24"
      DEMO_RATE_LIMIT_PREVIEW_PER_HOUR: "60"
      DEMO_RATE_LIMIT_EXECUTION_PER_HOUR: "40"
      DEMO_QUOTA_UPLOADS_PER_HOUR: "12"
      DEMO_QUOTA_UPLOAD_VOLUME_MB_PER_DAY: "200"
    services:
      postgres:
        image: postgres:16
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: admin_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: apps/admin

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install gems
        run: bundle install
        working-directory: apps/admin

      - name: Run Sorbet typecheck
        run: bundle exec srb tc
        working-directory: apps/admin

      - name: Generate OpenAPI docs
        run: bundle exec rake rswag:specs:swaggerize
        working-directory: apps/admin

      - name: Install node modules
        run: npm ci
        working-directory: apps/admin

      - name: Setup DB
        run: |
          bundle exec rails db:drop db:create db:schema:load
        working-directory: apps/admin

      - name: Run specs
        run: bundle exec rspec
        working-directory: apps/admin

  admin-packwerk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: apps/admin

      - name: Install gems
        run: bundle install
        working-directory: apps/admin

      - name: Run Packwerk (admin)
        run: bundle exec packwerk check
        working-directory: apps/admin

  admin-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: apps/admin

      - name: Install gems
        run: bundle install
        working-directory: apps/admin

      - name: Run Brakeman
        run: bundle exec brakeman --no-pager
        working-directory: apps/admin
