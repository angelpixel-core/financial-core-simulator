name: CI

on:
  pull_request:
    paths:
      - .github/workflows/**
      - bin/**
      - lib/**
      - spec/**
      - apps/admin/**
      - .rubocop.yml
      - Gemfile
      - Gemfile.lock
      - financial-core-simulator.gemspec
  push:
    branches:
      - main
      - development
    paths:
      - .github/workflows/**
      - bin/**
      - lib/**
      - spec/**
      - apps/admin/**
      - .rubocop.yml
      - Gemfile
      - Gemfile.lock
      - financial-core-simulator.gemspec

jobs:
  gem-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run gem specs
        run: bundle exec rspec

  gem-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop

      - name: Run Reek
        run: bundle exec reek

      - name: Run RubyCritic
        run: bundle exec rubycritic lib spec --no-browser

  gem-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run Bundler Audit
        run: bundle exec bundler-audit --update

  admin-tests:
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/admin_test
    services:
      postgres:
        image: postgres:16
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: admin_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: apps/admin

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install gems
        run: bundle install
        working-directory: apps/admin

      - name: Install node modules
        run: npm ci
        working-directory: apps/admin

      - name: Setup DB
        run: |
          bundle exec rails db:drop db:create db:schema:load
        working-directory: apps/admin

      - name: Run specs
        run: bundle exec rspec
        working-directory: apps/admin

  admin-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: apps/admin

      - name: Install gems
        run: bundle install
        working-directory: apps/admin

      - name: Run Brakeman
        run: bundle exec brakeman --no-pager
        working-directory: apps/admin
