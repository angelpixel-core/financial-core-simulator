name: CI

on:
  pull_request:
    paths:
      - .github/workflows/**
      - lib/**
      - spec/**
      - apps/admin/**
      - Gemfile
      - Gemfile.lock
      - financial-core-simulator.gemspec
  push:
    branches:
      - main
      - development
    paths:
      - .github/workflows/**
      - lib/**
      - spec/**
      - apps/admin/**
      - Gemfile
      - Gemfile.lock
      - financial-core-simulator.gemspec

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      gem: ${{ steps.filter.outputs.gem }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gem:
              - lib/**
              - spec/**
              - Gemfile
              - Gemfile.lock
              - financial-core-simulator.gemspec
            admin:
              - apps/admin/**

  gem-tests:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.gem == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run gem specs
        run: bundle exec rspec

  gem-quality:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.gem == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop

      - name: Run Reek
        run: bundle exec reek

      - name: Run RubyCritic
        run: bundle exec rubycritic

  gem-security:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.gem == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run Brakeman
        run: bundle exec brakeman

      - name: Run Bundler Audit
        run: bundle exec bundle-audit check --update

  admin-tests:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    services:
      postgres:
        image: postgres:16
        ports:
          - "5432:5432"
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: apps/admin

      - name: Install gems
        run: bundle install
        working-directory: apps/admin

      - name: Setup DB
        run: |
          bundle exec rails db:create
          bundle exec rails db:migrate
        working-directory: apps/admin

      - name: Run specs
        run: bundle exec rspec
        working-directory: apps/admin
